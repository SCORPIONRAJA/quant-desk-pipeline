name: Continuous Autonomous Quant Desk Update Loop

on:
  schedule:
    - cron: '*/15 * * * *'  # Automatically triggers the automated pipeline every 15 minutes
  workflow_dispatch:      # Retains your manual blue "Run workflow" dropdown button

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Files
      uses: actions/checkout@v4

    - name: Initialize Python Ingestion Core
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Quant Pipeline Packages
      run: |
        python -m pip install --upgrade pip
        pip install yfinance openpyxl pandas numpy

    # Executes your clean, grounded calculation module on the cloud server node
    - name: Execute Multi-Agent Performance Audit
      run: |
        python app.py

    # Automatically publishes your freshly generated dashboard page straight to your live website URL
    - name: Deploy Compiled Dashboard to Free GitHub Pages Web Link
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .
        keep_files: true
