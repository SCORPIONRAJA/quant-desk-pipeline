name: Continuous Autonomous Quant Desk Update Loop

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Files
      uses: actions/checkout@v4

    - name: Initialize Python Ingestion Core
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Quant Pipeline Packages
      run: |
        python -m pip install --upgrade pip
        pip install yfinance openpyxl pandas numpy

    - name: Execute Multi-Agent Performance Audit
      run: |
        python app.py

    - name: Deploy Compiled Dashboard to Free GitHub Pages Web Link
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .
        keep_files: true
